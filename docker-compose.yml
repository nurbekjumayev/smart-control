version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: smartuser
      POSTGRES_PASSWORD: smartpassword
      POSTGRES_DB: smartdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://smartuser:smartpassword@db:5432/smartdb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  bot:
    build:
      context: ./bot
    restart: always
    environment:
      - BOT_TOKEN=YOUR_BOT_TOKEN_HERE
      - API_URL=http://backend:8000
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
