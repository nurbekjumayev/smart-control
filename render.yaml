databases:
  - name: smart-db
    databaseName: smartdb
    user: smartuser
    plan: free # Beepul Postgres
    region: frankfurt

services:
  # 1. FastAPI (Backend API)
  - type: web
    name: smart-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-db
          property: connectionString

  # 2. Telegram Bot (Web Service version for Free Tier)
  - type: web
    name: smart-bot
    env: python
    region: frankfurt
    plan: free
    buildCommand: "cd bot && pip install -r requirements.txt"
    startCommand: "cd bot && python main.py" # Bot needs to listen to a dummy port if Render requires it
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PORT
        value: "10000"
      - key: API_URL
        value: "https://smart-backend.onrender.com"
